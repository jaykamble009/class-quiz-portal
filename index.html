      var process = window.process;
      
      // Advanced Global Error Handler
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('ResizeObserver') || e.message.includes('TensorFlow'))) return;
        
        console.error("Global Error Caught:", e);
        
        const root = document.getElementById('root');
        // Only show full crash screen for critical errors, not script errors or TFLite noise
        if (root && !root.innerHTML.includes('System Crash') && !e.message.includes('Script error')) {
           // Optional: You can render a fallback UI here if needed
        }
      });

      // --- LOG SUPPRESSION FIX ---
      // Filter out TensorFlow Lite / MediaPipe INFO logs that look like errors
      (function() {
        const originalConsoleInfo = console.info;
        const originalConsoleLog = console.log;
        const originalConsoleWarn = console.warn;
        const originalConsoleError = console.error;

        const shouldSuppress = (args) => {
          if (args.length > 0) {
              const msg = String(args[0]);
              if (msg.includes('TensorFlow Lite') || 
                  msg.includes('XNNPACK delegate') ||
                  msg.includes('delegate for CPU') ||
                  msg.includes('Mediapipe') ||
                  msg.includes('WASM') ||
                  msg.includes('created delegate')) {
                  return true; 
              }
          }
          return false;
        };

        console.info = function(...args) {
          if (shouldSuppress(args)) return;
          originalConsoleInfo.apply(console, args);
        };

        console.log = function(...args) {
           if (shouldSuppress(args)) return;
           originalConsoleLog.apply(console, args);
        };

        console.warn = function(...args) {
           if (shouldSuppress(args)) return;
           originalConsoleWarn.apply(console, args);
        };

        console.error = function(...args) {
           if (shouldSuppress(args)) return;
           originalConsoleError.apply(console, args);
        };
      })();
      // ---------------------------
    </script>
